<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ariful Portfolio</title>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    .hero{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    h1{
      font-size:60px;
      margin-bottom:10px;
    }

    p{
      font-size:24px;
      margin-bottom:20px;
    }

    .btn{
      background:#2563eb;
      color:white;
      padding:14px 30px;
      text-decoration:none;
      border-radius:10px;
      font-size:18px;
    }

    .btn:hover{
      background:#1d4ed8;
    }

  </style>

</head>

<body>

  <div class="hero">

    <h1>Hi, I'm Ariful</h1>

    <p>Web Developer</p>

    <a href="#" class="btn">Contact Me</a>

  </div>

</body>

</html>
